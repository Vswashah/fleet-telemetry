apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-producer
  namespace: fleet-telemetry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fleet-producer
  template:
    metadata:
      labels:
        app: fleet-producer
    spec:
      automountServiceAccountToken: false
      containers:
        - name: producer
          image: ghcr.io/vswashah/fleet-telemetry:IMAGE_TAG
          command: ["python", "-m", "producer.kafka_producer"]
          envFrom:
            - configMapRef:
                name: fleet-config
          env:
            - name: METRICS_PORT
              value: "8001"
            - name: VEHICLE_COUNT
              value: "10"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
              ephemeral-storage: "256Mi"