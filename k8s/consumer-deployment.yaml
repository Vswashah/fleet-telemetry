apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-consumer
  namespace: fleet-telemetry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fleet-consumer
  template:
    metadata:
      labels:
        app: fleet-consumer
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: consumer
          image: ghcr.io/vswashah/fleet-telemetry:IMAGE_TAG
          command: ["python", "-m", "consumer.kafka_consumer"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: fleet-config
          env:
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: fleet-secrets
                  key: postgres-dsn
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
              ephemeral-storage: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
              ephemeral-storage: "512Mi"
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-consumer
  namespace: fleet-telemetry
spec:
  selector:
    app: fleet-consumer
  ports:
    - port: 8000
      targetPort: 8000