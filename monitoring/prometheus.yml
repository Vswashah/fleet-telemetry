global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: fleet-consumer
    static_configs:
      - targets: ["consumer:8000"]

  - job_name: fleet-producer
    static_configs:
      - targets: ["producer:8001"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]